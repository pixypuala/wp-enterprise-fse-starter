name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Lint theme PHP
        run: find theme -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
      - name: Validate theme.json is valid JSON
        run: php -r 'json_decode(file_get_contents("theme/theme.json")); exit(json_last_error() === JSON_ERROR_NONE ? 0 : 1);'
