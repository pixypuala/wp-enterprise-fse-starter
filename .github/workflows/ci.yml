name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Lint theme PHP
        run: find theme -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
      - name: Validate all theme JSON (theme.json + style variations)
        run: |
          find theme -name '*.json' -print0 | xargs -0 -n1 php -r '
            json_decode(file_get_contents($argv[1]));
            if (json_last_error() !== JSON_ERROR_NONE) {
              fwrite(STDERR, "Invalid JSON: {$argv[1]} — " . json_last_error_msg() . "\n");
              exit(1);
            }
            echo "ok: {$argv[1]}\n";
          '
